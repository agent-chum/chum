# chum first-party manifest for @modelcontextprotocol/server-puppeteer.
#
# Headless-browser automation. No edits required — the server
# downloads and manages its own Chromium on first run.
#
# Note: the first `chum start puppeteer` will be slow while
# puppeteer downloads its bundled Chromium (~200 MB). Subsequent
# starts are fast.

schema_version = "0.1"

[package]
name = "puppeteer"
version = "0.1.0"
description = "Anthropic's official puppeteer MCP server — headless browser automation (navigate, screenshot, click, fill)."
license = "MIT"
authors = ["chum first-party manifests"]
tags = ["browser", "automation", "puppeteer", "official"]

[source]
kind = "npm"
package = "@modelcontextprotocol/server-puppeteer"
version = "2025.5.12"

[runtime]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-puppeteer"]

[runtime.transport]
kind = "stdio"

[lifecycle]
restart = "on-failure"
startup_timeout_sec = 30  # first launch downloads Chromium
shutdown_grace_sec = 10

[health]
kind = "process"

[capabilities]
tools = [
    "puppeteer_navigate",
    "puppeteer_screenshot",
    "puppeteer_click",
    "puppeteer_fill",
    "puppeteer_select",
    "puppeteer_hover",
    "puppeteer_evaluate",
]
resources = []
prompts = []

# v0.1 broker gap: puppeteer needs broad network access (any host
# any user might browse) plus subprocess execution of its bundled
# Chromium binary. v0.1 broker is exact-string match only —
# `network.outbound = ["*"]` won't be honored, and listing every
# possible domain isn't viable.
#
# Decision: leave `[permissions]` empty in v0.1. The manifest
# declares no requirements, so the broker auto-allows (same path
# as pre-broker installs). v0.2 introduces wildcard matching
# (`*.googleapis.com`, etc.) and a `subprocess.exec` grant for
# Chromium, at which point this manifest grows a real
# `[permissions]` block.
#
# Until then, puppeteer is the one first-party manifest that
# escapes broker bookkeeping by design. Documented in
# `docs/BROKER_DESIGN.md` §9.
