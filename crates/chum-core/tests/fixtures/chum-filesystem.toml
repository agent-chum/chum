schema_version = "0.1"

[package]
name = "filesystem"
version = "0.1.0"
description = "Anthropic's official MCP server exposing filesystem read/write."
license = "MIT"
authors = ["Anthropic"]
tags = ["official", "files"]

[source]
kind = "npm"
package = "@modelcontextprotocol/server-filesystem"
version = "^0.1"

[runtime]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "${HOME}/Documents"]

[runtime.transport]
kind = "stdio"

[lifecycle]
restart = "on-failure"
startup_timeout_sec = 10
shutdown_grace_sec = 5

[health]
kind = "process"

[capabilities]
tools = ["read_file", "write_file", "list_directory", "create_directory", "move_file", "search_files"]
resources = []
prompts = []

# v0.1 typed permissions. The broker checks these at spawn time
# against the user's `chum permit` grants and refuses spawn if any
# declared permission is ungranted. Real enforcement (sandbox-exec,
# env scrubbing) lands in v0.2.
[permissions]
[permissions.filesystem]
read  = ["${HOME}/Documents", "${HOME}/Desktop"]
write = ["${HOME}/Documents"]
[permissions.env]
read = ["HOME"]
